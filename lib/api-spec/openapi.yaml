openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: FleetSaaS school bus tracking API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: tenants
    description: Tenant management
  - name: passengers
    description: Passenger management
  - name: stations
    description: Station / stop management
  - name: drivers
    description: Driver management
  - name: vehicles
    description: Vehicle management
  - name: fleet
    description: Fleet swap operations
  - name: trips
    description: Active trip tracking
  - name: announcements
    description: Emergency notices
  - name: subscriptions
    description: Subscription & paywall
  - name: dashboard
    description: SuperAdmin analytics
  - name: routes
    description: Route & fleet assignment management
  - name: geocode
    description: Address-to-coordinate lookup

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ─── TENANTS ────────────────────────────────────────────────────────────────
  /tenants/me:
    get:
      operationId: getTenantMe
      tags: [tenants]
      summary: Get current tenant info
      responses:
        "200":
          description: Tenant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tenant"

  # ─── ANNOUNCEMENTS ──────────────────────────────────────────────────────────
  /announcements:
    get:
      operationId: listAnnouncements
      tags: [announcements]
      summary: List emergency notices for current tenant
      responses:
        "200":
          description: List of announcements
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Announcement"
    post:
      operationId: createAnnouncement
      tags: [announcements]
      summary: Create an emergency announcement (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnnouncementInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Announcement"

  /announcements/{id}:
    delete:
      operationId: deleteAnnouncement
      tags: [announcements]
      summary: Delete an announcement
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ─── STATIONS ───────────────────────────────────────────────────────────────
  /stations:
    get:
      operationId: listStations
      tags: [stations]
      summary: List all geofenced stations
      responses:
        "200":
          description: Station list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Station"
    post:
      operationId: createStation
      tags: [stations]
      summary: Add a new geofenced station (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StationInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Station"

  /stations/{id}:
    delete:
      operationId: deleteStation
      tags: [stations]
      summary: Delete a station
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ─── DRIVERS ────────────────────────────────────────────────────────────────
  /drivers:
    get:
      operationId: listDrivers
      tags: [drivers]
      summary: List all drivers for this tenant
      responses:
        "200":
          description: Driver list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Driver"
    post:
      operationId: createDriver
      tags: [drivers]
      summary: Add a new driver
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DriverInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Driver"

  /drivers/{id}:
    patch:
      operationId: patchDriver
      tags: [drivers]
      summary: Update driver details (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DriverUpdate"
      responses:
        "200":
          description: Updated driver
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Driver"
    delete:
      operationId: deleteDriver
      tags: [drivers]
      summary: Remove a driver (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /drivers/active:
    get:
      operationId: getActiveDriver
      tags: [drivers]
      summary: Get currently assigned active driver
      responses:
        "200":
          description: Active driver
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Driver"

  # ─── VEHICLES ───────────────────────────────────────────────────────────────
  /vehicles:
    get:
      operationId: listVehicles
      tags: [vehicles]
      summary: List all vehicles for this tenant
      responses:
        "200":
          description: Vehicle list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Vehicle"
    post:
      operationId: createVehicle
      tags: [vehicles]
      summary: Add a new vehicle (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VehicleCreate"
      responses:
        "201":
          description: Created vehicle
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vehicle"

  /vehicles/{id}:
    patch:
      operationId: patchVehicle
      tags: [vehicles]
      summary: Update vehicle tag (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VehicleUpdate"
      responses:
        "200":
          description: Updated vehicle
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vehicle"
    delete:
      operationId: deleteVehicle
      tags: [vehicles]
      summary: Remove a vehicle (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ─── FLEET SWAP ─────────────────────────────────────────────────────────────
  /fleet/swap:
    post:
      operationId: swapFleet
      tags: [fleet]
      summary: Emergency fleet swap — reassign driver and/or vehicle to active route
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FleetSwapInput"
      responses:
        "200":
          description: Updated active driver info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Driver"

  # ─── PASSENGERS ─────────────────────────────────────────────────────────────
  /passengers:
    get:
      operationId: listPassengers
      tags: [passengers]
      summary: List all passengers for today's trip checklist
      parameters:
        - in: query
          name: phone
          schema:
            type: string
          description: Filter passengers to those whose parent phone matches this value (used for parent portal scoping)
      responses:
        "200":
          description: Passenger list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Passenger"
    post:
      operationId: createPassenger
      tags: [passengers]
      summary: Register a new passenger
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PassengerInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Passenger"

  /passengers/{id}:
    delete:
      operationId: deletePassenger
      tags: [passengers]
      summary: Remove a passenger
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
    get:
      operationId: getPassenger
      tags: [passengers]
      summary: Get passenger by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Passenger
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Passenger"
    patch:
      operationId: updatePassenger
      tags: [passengers]
      summary: Update passenger profile or photo
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PassengerUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Passenger"

  /passengers/{id}/send-boarding-otp:
    post:
      operationId: sendBoardingOtp
      tags: [passengers]
      summary: Generate a server-side boarding OTP for a passenger (driver action)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OTP generated (sent to parent via SMS in production; returned as demoCode in simulation)
          content:
            application/json:
              schema:
                type: object
                required: [success]
                properties:
                  success:
                    type: boolean
                  demoCode:
                    type: string
                    description: Demo only — the generated OTP for testing (not shown in production UI)

  /passengers/{id}/qr-token:
    get:
      operationId: getPassengerQrToken
      tags: [passengers]
      summary: Get a signed QR token for a passenger (parent action) — encodes passenger ID with HMAC signature
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Signed QR token payload (display as QR code in parent app)
          content:
            application/json:
              schema:
                type: object
                required: [token]
                properties:
                  token:
                    type: string
                    description: Signed token string to embed in a QR code

  /passengers/{id}/board:
    post:
      operationId: boardPassenger
      tags: [passengers]
      summary: Mark passenger as boarded (driver action) — requires valid OTP or QR token
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                otp:
                  type: string
                  description: The OTP entered by the driver, validated server-side
                qrToken:
                  type: string
                  description: Signed QR token scanned from the parent's device (alternative to OTP)
      responses:
        "200":
          description: Updated passenger with boarding status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Passenger"
        "401":
          description: Invalid or expired OTP / QR token

  /passengers/{id}/unboard:
    post:
      operationId: unboardPassenger
      tags: [passengers]
      summary: Mark passenger as unboarded (driver action)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated passenger with pending status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Passenger"

  /passengers/{id}/leave:
    post:
      operationId: markPassengerLeave
      tags: [passengers]
      summary: Mark passenger as on leave (parent or admin action)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated passenger
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Passenger"

  # ─── TRIPS ──────────────────────────────────────────────────────────────────
  /trips/active:
    get:
      operationId: getActiveTrip
      tags: [trips]
      summary: Get live tracking data for the active trip
      responses:
        "200":
          description: Active trip with live position and ETA
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActiveTrip"

  /trips/timeline:
    get:
      operationId: getTripTimeline
      tags: [trips]
      summary: Get the tracking event timeline for today's trip
      responses:
        "200":
          description: Timeline events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TimelineEvent"

  /trips/location:
    post:
      operationId: updateDriverLocation
      tags: [trips]
      summary: Post driver GPS coordinates to update the live bus position
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DriverLocationUpdate"
      responses:
        "200":
          description: Location recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
        "400":
          description: Missing or invalid coordinates

  /trips/sos:
    post:
      operationId: triggerSos
      tags: [trips]
      summary: Trigger an emergency SOS alert
      responses:
        "200":
          description: SOS acknowledged
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SosResponse"

  /trips/start:
    post:
      operationId: startJourney
      tags: [trips]
      summary: Mark the journey as started and notify all passengers and admins
      responses:
        "200":
          description: Journey start acknowledged
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SosResponse"

  /trips/complete:
    post:
      operationId: completeJourney
      tags: [trips]
      summary: Mark the current journey as complete and notify all passengers and admins
      responses:
        "200":
          description: Journey marked complete
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SosResponse"

  /trips/history:
    get:
      operationId: listTripHistory
      tags: [trips]
      summary: List past trip logs for this tenant (newest first)
      parameters:
        - in: query
          name: driverId
          schema:
            type: integer
          description: Filter to trips driven by a specific driver
        - in: query
          name: passengerId
          schema:
            type: integer
          description: Filter to trips on the route of this passenger
        - in: query
          name: routeId
          schema:
            type: integer
          description: Filter to trips on a specific route
        - in: query
          name: offset
          schema:
            type: integer
          description: Skip N records (for pagination, default 0)
        - in: query
          name: limit
          schema:
            type: integer
          description: Max records to return (default 50, max 200)
      responses:
        "200":
          description: Trip log list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TripLog"


  # ─── ROUTES ─────────────────────────────────────────────────────────────────
  /routes:
    get:
      operationId: listRoutes
      tags: [routes]
      summary: List all routes for this tenant
      responses:
        "200":
          description: Route list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Route"
    post:
      operationId: createRoute
      tags: [routes]
      summary: Create a new route
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RouteInput"
      responses:
        "201":
          description: Created route
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Route"

  /routes/{id}:
    patch:
      operationId: updateRoute
      tags: [routes]
      summary: Update route name or assigned driver/vehicle (fleet swap)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RouteUpdate"
      responses:
        "200":
          description: Updated route
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Route"
    delete:
      operationId: deleteRoute
      tags: [routes]
      summary: Delete a route
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /routes/{id}/stations:
    get:
      operationId: listRouteStations
      tags: [routes]
      summary: Get ordered stations for a route
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Ordered station list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RouteStation"
    post:
      operationId: addRouteStation
      tags: [routes]
      summary: Add a station to a route
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RouteStationInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RouteStation"

  /routes/{id}/stations/{routeStationId}:
    delete:
      operationId: removeRouteStation
      tags: [routes]
      summary: Remove a route-station entry by its row ID (supports duplicate stops)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: routeStationId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Removed

  /routes/{id}/stations/reorder:
    post:
      operationId: reorderRouteStations
      tags: [routes]
      summary: Reorder stations within a route
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReorderStationsInput"
      responses:
        "200":
          description: Reordered stations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RouteStation"

  # ─── GEOCODE ────────────────────────────────────────────────────────────────
  /geocode:
    get:
      operationId: geocodeAddress
      tags: [geocode]
      summary: Look up coordinates for a station name or address (Nominatim)
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Geocode results
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GeocodeResult"

  # ─── SUBSCRIPTIONS ──────────────────────────────────────────────────────────
  /subscriptions/me:
    get:
      operationId: getMySubscription
      tags: [subscriptions]
      summary: Get current subscription status (includes trial info and paywall flag)
      responses:
        "200":
          description: Subscription status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Subscription"

  /subscriptions/activate:
    post:
      operationId: activateSubscription
      tags: [subscriptions]
      summary: Activate or upgrade a subscription (mock payment)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubscriptionActivationInput"
      responses:
        "200":
          description: Activated subscription
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Subscription"

  # ─── CALENDAR EVENTS ────────────────────────────────────────────────────────
  /calendar-events:
    get:
      operationId: listCalendarEvents
      tags: [calendar]
      summary: List calendar events for the tenant
      parameters:
        - in: query
          name: month
          schema:
            type: string
            description: Filter by AD month prefix YYYY-MM (optional)
      responses:
        "200":
          description: Calendar events
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CalendarEventList"
    post:
      operationId: createCalendarEvent
      tags: [calendar]
      summary: Create a calendar event or holiday
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCalendarEventBody"
      responses:
        "201":
          description: Created event
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CalendarEvent"

  /calendar-events/{id}:
    patch:
      operationId: updateCalendarEvent
      tags: [calendar]
      summary: Update a calendar event
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCalendarEventBody"
      responses:
        "200":
          description: Updated event
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CalendarEvent"
    delete:
      operationId: deleteCalendarEvent
      tags: [calendar]
      summary: Delete a calendar event
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ─── SUPERADMIN DASHBOARD ───────────────────────────────────────────────────
  /dashboard/stats:
    get:
      operationId: getDashboardStats
      tags: [dashboard]
      summary: Global platform statistics (SuperAdmin only)
      responses:
        "200":
          description: Global stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /dashboard/tenants:
    get:
      operationId: listTenants
      tags: [dashboard]
      summary: List all tenant organizations (SuperAdmin only)
      responses:
        "200":
          description: Tenant list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TenantSummary"

  /superadmin/trip-history:
    get:
      operationId: listSuperadminTripHistory
      tags: [superadmin]
      summary: Cross-tenant trip log for SuperAdmin dashboard only
      parameters:
        - in: query
          name: offset
          schema:
            type: integer
          description: Skip N records (for pagination, default 0)
        - in: query
          name: limit
          schema:
            type: integer
          description: Max records to return (default 50, max 200)
      responses:
        "200":
          description: Cross-tenant trip log list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GlobalTripLog"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    Tenant:
      type: object
      required: [id, name, currency, country]
      properties:
        id:
          type: integer
        name:
          type: string
        logoUrl:
          type: ["string", "null"]
        bannerUrl:
          type: ["string", "null"]
        currency:
          type: string
          enum: [NPR, USD]
        country:
          type: string
        createdAt:
          type: string
          format: date-time

    TenantSummary:
      type: object
      required: [id, name, vehicleCount, passengerCount, subscriptionTier]
      properties:
        id:
          type: integer
        name:
          type: string
        vehicleCount:
          type: integer
        passengerCount:
          type: integer
        subscriptionTier:
          type: string
          enum: [silver, gold, platinum, trial]
        monthlyRevenue:
          type: number

    Announcement:
      type: object
      required: [id, tenantId, message, severity, createdAt]
      properties:
        id:
          type: integer
        tenantId:
          type: integer
        message:
          type: string
        messageNe:
          type: ["string", "null"]
        severity:
          type: string
          enum: [info, warning, emergency]
        createdAt:
          type: string
          format: date-time

    AnnouncementInput:
      type: object
      required: [message, severity]
      properties:
        message:
          type: string
        messageNe:
          type: string
        severity:
          type: string
          enum: [info, warning, emergency]

    Route:
      type: object
      required: [id, tenantId, name, isActive]
      properties:
        id:
          type: integer
        tenantId:
          type: integer
        name:
          type: string
        driverId:
          type: ["integer", "null"]
        vehicleId:
          type: ["integer", "null"]
        isActive:
          type: boolean
        driverName:
          type: ["string", "null"]
        vehiclePlate:
          type: ["string", "null"]
        departureTime:
          type: string
          description: "Base departure time string e.g. '06:00 AM'"
        avgSpeedKmh:
          type: integer
          description: Average fleet speed in km/h for ETA calculation

    RouteInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
        driverId:
          type: integer
        vehicleId:
          type: integer
        departureTime:
          type: string
        avgSpeedKmh:
          type: integer

    RouteUpdate:
      type: object
      properties:
        name:
          type: string
        driverId:
          type: ["integer", "null"]
        vehicleId:
          type: ["integer", "null"]
        isActive:
          type: boolean
        departureTime:
          type: string
        avgSpeedKmh:
          type: integer

    RouteStation:
      type: object
      required: [id, routeId, stationId, position]
      properties:
        id:
          type: integer
        routeId:
          type: integer
        stationId:
          type: integer
        position:
          type: integer
        direction:
          type: string
          description: "'forward' or 'return'"
        stopLabel:
          type: ["string", "null"]
          description: Optional custom label e.g. "Koteshwor (Return)"
        stationName:
          type: string
        lat:
          type: number
        lng:
          type: number
        radius:
          type: integer
        eta:
          type: ["string", "null"]
          description: "Computed ETA string e.g. '06:20 AM'"

    RouteStationInput:
      type: object
      required: [stationId]
      properties:
        stationId:
          type: integer
        position:
          type: integer
        direction:
          type: string
          description: "'forward' or 'return'"
        stopLabel:
          type: string
          description: Optional custom display label

    ReorderStationsInput:
      type: object
      required: [orderedIds]
      properties:
        orderedIds:
          type: array
          items:
            type: integer
          description: Ordered list of route_station row IDs (supports duplicate stops)

    GeocodeResult:
      type: object
      required: [displayName, lat, lng]
      properties:
        displayName:
          type: string
        lat:
          type: number
        lng:
          type: number

    Station:
      type: object
      required: [id, name, lat, lng]
      properties:
        id:
          type: integer
        name:
          type: string
        lat:
          type: number
        lng:
          type: number
        radius:
          type: integer
        tenantId:
          type: integer

    StationInput:
      type: object
      required: [name, lat, lng]
      properties:
        name:
          type: string
        lat:
          type: number
        lng:
          type: number
        radius:
          type: integer

    Driver:
      type: object
      required: [id, name, phone, vehicleNumber]
      properties:
        id:
          type: integer
        name:
          type: string
        phone:
          type: string
        photoUrl:
          type: ["string", "null"]
        gender:
          type: ["string", "null"]
          description: "Driver gender (Male / Female / Other)"
        vehicleNumber:
          type: string
        isActive:
          type: boolean
        isOnline:
          type: boolean

    DriverInput:
      type: object
      required: [name, phone, vehicleNumber]
      properties:
        name:
          type: string
        phone:
          type: string
        photoUrl:
          type: string
        gender:
          type: string
          description: "Driver gender (Male / Female / Other)"
        vehicleNumber:
          type: string

    DriverUpdate:
      type: object
      properties:
        name:
          type: string
        phone:
          type: string
        vehicleNumber:
          type: string
        photoUrl:
          type: string
          nullable: true
        gender:
          type: string
          nullable: true
        isActive:
          type: boolean
        isOnline:
          type: boolean

    Vehicle:
      type: object
      required: [id, plateNumber, model]
      properties:
        id:
          type: integer
        plateNumber:
          type: string
        model:
          type: string
        capacity:
          type: integer
        isActive:
          type: boolean
        tag:
          type: string
          nullable: true

    VehicleCreate:
      type: object
      required: [plateNumber, model]
      properties:
        plateNumber:
          type: string
        model:
          type: string
        capacity:
          type: integer
        tag:
          type: string
          nullable: true

    VehicleUpdate:
      type: object
      properties:
        tag:
          type: string
          nullable: true

    FleetSwapInput:
      type: object
      required: [driverId, vehicleId]
      properties:
        driverId:
          type: integer
        vehicleId:
          type: integer
        reason:
          type: string

    Passenger:
      type: object
      required: [id, name, role, status, stationId]
      properties:
        id:
          type: integer
        name:
          type: string
        phone:
          type: ["string", "null"]
        photoUrl:
          type: ["string", "null"]
        role:
          type: string
          enum: [student, staff, driver]
        status:
          type: string
          enum: [pending, boarded, absent, leave]
        stationId:
          type: integer
        routeId:
          type: ["integer", "null"]
        stationName:
          type: ["string", "null"]
        boardedAt:
          type: ["string", "null"]
          format: date-time
        liveToday:
          type: integer
          description: 1 if the passenger confirmed they are riding today, 0 otherwise
        quickMessage:
          type: ["string", "null"]
          description: Last quick status message sent by the passenger
        className:
          type: ["string", "null"]
          description: "Class/grade the student is enrolled in (e.g. Class 10, Grade 8)"
        section:
          type: ["string", "null"]
          description: "Section within the class (e.g. A, B, Science)"
        rollNumber:
          type: ["string", "null"]
          description: School roll / admission number
        faculty:
          type: ["string", "null"]
          description: "Faculty or stream, if applicable (e.g. Science, Management, Humanities)"
        designation:
          type: ["string", "null"]
          description: "Staff designation (e.g. Teacher, Accountant, School Staff, or a custom value)"
        parentName:
          type: ["string", "null"]
          description: Parent or guardian full name
        gender:
          type: ["string", "null"]
          description: "Passenger gender (Male / Female / Other)"

    PassengerInput:
      type: object
      required: [name, role, stationId]
      properties:
        name:
          type: string
        phone:
          type: string
          description: Contact / parent phone number (used for OTP login)
        photoUrl:
          type: string
        parentName:
          type: string
          description: Parent or guardian full name
        gender:
          type: string
          description: "Passenger gender (Male / Female / Other)"
        role:
          type: string
          enum: [student, staff, driver]
        stationId:
          type: integer
        routeId:
          type: integer
        className:
          type: string
          description: "Class/grade the student is enrolled in (e.g. Class 10, Grade 8)"
        section:
          type: string
          description: "Section within the class (e.g. A, B, Science)"
        rollNumber:
          type: string
          description: School roll / admission number
        faculty:
          type: string
          description: "Faculty or stream, if applicable (e.g. Science, Management, Humanities)"
        designation:
          type: string
          description: "Staff designation (e.g. Teacher, Accountant, School Staff, or a custom value)"

    PassengerUpdate:
      type: object
      properties:
        name:
          type: string
        phone:
          type: string
        photoUrl:
          type: string
        stationId:
          type: integer
        routeId:
          type: ["integer", "null"]
        liveToday:
          type: integer
        quickMessage:
          type: string
        className:
          type: string
        section:
          type: string
        rollNumber:
          type: string
        faculty:
          type: string
        designation:
          type: string
        parentName:
          type: string
        gender:
          type: string

    ActiveTrip:
      type: object
      required: [tripId, currentLat, currentLng, etaMinutes, nextStationName, routeName]
      properties:
        tripId:
          type: integer
        currentLat:
          type: number
        currentLng:
          type: number
        isJourneyActive:
          type: boolean
          description: True only when the driver is currently online and a trip is running
        isLive:
          type: boolean
          description: True when the driver has posted a real GPS fix
        locationUpdatedAt:
          type: string
          nullable: true
        speedKmh:
          type: number
          nullable: true
          description: Current bus speed in km/h, computed from consecutive GPS pings
        etaMinutes:
          type: integer
        nextStationName:
          type: string
        routeName:
          type: string
        boardedCount:
          type: integer
        totalPassengers:
          type: integer
        driver:
          $ref: "#/components/schemas/Driver"

    TimelineEvent:
      type: object
      required: [id, time, description, status]
      properties:
        id:
          type: integer
        time:
          type: string
        description:
          type: string
        status:
          type: string
          enum: [completed, in_progress, upcoming]

    DriverLocationUpdate:
      type: object
      required: [lat, lng]
      properties:
        lat:
          type: number
          format: double
          description: Latitude in decimal degrees
        lng:
          type: number
          format: double
          description: Longitude in decimal degrees
        accuracy:
          type: number
          format: double
          description: GPS accuracy in meters (optional)
        speed:
          type: number
          format: double
          description: Device-reported speed in meters/second (optional; from navigator.geolocation coords.speed)
        driverId:
          type: integer
          description: Driver ID (optional; defaults to the active driver for the tenant)

    OkResponse:
      type: object
      required: [ok]
      properties:
        ok:
          type: boolean

    SosResponse:
      type: object
      required: [acknowledged, message]
      properties:
        acknowledged:
          type: boolean
        message:
          type: string

