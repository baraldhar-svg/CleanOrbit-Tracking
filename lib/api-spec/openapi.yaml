        tenantId:
          type: integer
        title:
          type: string
        description:
          type: ["string", "null"]
        type:
          type: string
          enum: [event, holiday]
        eventDate:
          type: string
          description: ISO date YYYY-MM-DD (AD)
        notified:
          type: boolean
        autoNotify:
          type: boolean
        createdAt:
          type: string
          format: date-time

    CalendarEventList:
      type: array
      items:
        $ref: "#/components/schemas/CalendarEvent"

    CreateCalendarEventBody:
      type: object
      required: [title, type, eventDate]
      properties:
        title:
          type: string
        description:
          type: string
        type:
          type: string
          enum: [event, holiday]
        eventDate:
          type: string
          description: ISO date YYYY-MM-DD (AD)
        autoNotify:
          type: boolean

    UpdateCalendarEventBody:
      type: object
      properties:
