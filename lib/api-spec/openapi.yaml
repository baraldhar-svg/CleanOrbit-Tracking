      type: object
      required: [id, userRole, tier, isActive, trialDaysRemaining, paywallActive]
      properties:
        id:
          type: integer
        userRole:
          type: string
          enum: [parent, driver, admin, superadmin]
        tier:
          type: string
          enum: [trial, silver, gold, platinum, flat_premium]
        isActive:
          type: boolean
        trialDaysRemaining:
          type: integer
        paywallActive:
          type: boolean
        expiresAt:
          type: ["string", "null"]
          format: date-time

    SubscriptionActivationInput:
      type: object
      required: [tier, paymentGateway]
      properties:
        tier:
          type: string
          enum: [silver, gold, platinum, flat_premium]
        paymentGateway:
          type: string
          enum: [esewa, khalti, stripe, paypal]
        vehicleCount:
          type: integer

    CalendarEvent:
      type: object
