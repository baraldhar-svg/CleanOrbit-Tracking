      properties:
        id:
          type: integer
        tenantId:
          type: integer
        tenantName:
          type: string
        driverId:
          type: ["integer", "null"]
        driverName:
          type: ["string", "null"]
        vehicleNumber:
          type: ["string", "null"]
        routeId:
          type: ["integer", "null"]
        routeName:
          type: ["string", "null"]
        startedAt:
          type: string
          format: date-time
        completedAt:
          type: ["string", "null"]
          format: date-time
        passengersTotal:
