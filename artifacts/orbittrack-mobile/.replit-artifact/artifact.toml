kind = "mobile"
previewPath = "/mobile/"
title = "OrbitTrack Mobile"
version = "1.0.0"
id = "artifacts/orbittrack-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/mobile/" ]
localPort = 24657

[services.development]
run = "pnpm --filter @workspace/orbittrack-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/orbittrack-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/orbittrack-mobile", "run", "serve" ]

[services.env]
PORT = "24657"
BASE_PATH = "/mobile/"
